<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morp | Change Plan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="./alien-favicon.svg" />
    <link rel="stylesheet" href="./app-pages.css" />
    <style>
      /* Comment icon tooltip */
      .comment-icon-wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
        margin-left: 0.4rem;
        color: var(--accent2);
        cursor: default;
        vertical-align: middle;
      }
      .comment-icon-wrap svg { display: block; }
      .comment-tooltip {
        display: none;
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        background: var(--text);
        color: #fff;
        padding: 0.55rem 0.75rem;
        border-radius: 8px;
        font-size: 0.78rem;
        line-height: 1.45;
        white-space: pre-wrap;
        max-width: 260px;
        min-width: 120px;
        z-index: 50;
        box-shadow: 0 4px 16px rgba(0,0,0,0.18);
        pointer-events: none;
        font-family: inherit;
      }
      .comment-tooltip::after {
        content: '';
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border: 5px solid transparent;
        border-top-color: var(--text);
      }
      .comment-icon-wrap:hover .comment-tooltip { display: block; }

      /* Disabled generate button state */
      .generate-plan-btn:disabled,
      .generate-plan-btn[aria-disabled="true"] {
        background: var(--bg-subtle);
        color: var(--text-muted);
        border: 1.5px solid var(--border);
        cursor: not-allowed;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="Morp home">
        <svg class="brand-mascot" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="20" cy="24" rx="13" ry="12" fill="#3cb97a"/>
          <ellipse cx="20" cy="17" rx="10" ry="9" fill="#4fd48c"/>
          <circle cx="20" cy="16" r="5.5" fill="white"/>
          <circle cx="20" cy="16" r="3.2" fill="#1c1a17"/>
          <circle cx="21.3" cy="14.8" r="1.1" fill="white"/>
          <line x1="16" y1="8" x2="13" y2="3" stroke="#3cb97a" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="13" cy="3" r="2" fill="#ff6b35"/>
          <line x1="24" y1="8" x2="27" y2="3" stroke="#3cb97a" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="27" cy="3" r="2" fill="#ff6b35"/>
          <path d="M15 26 Q20 31 25 26" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          <ellipse cx="8" cy="24" rx="3" ry="5" fill="#3cb97a" transform="rotate(-15 8 24)"/>
          <ellipse cx="32" cy="24" rx="3" ry="5" fill="#3cb97a" transform="rotate(15 32 24)"/>
        </svg>
        Morp
      </a>
      <div class="user-menu">
        <button class="user-menu-trigger" id="userMenuTrigger" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="accountDropdown">
          <svg class="avatar-mini" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="13" cy="13" r="13" fill="#fff0eb"/>
            <ellipse cx="13" cy="15" rx="7" ry="6" fill="#ff6b35"/>
            <circle cx="13" cy="12" r="4.5" fill="#ff8c5a"/>
            <circle cx="13" cy="11" r="2.5" fill="#1c1a17"/>
            <circle cx="14" cy="10.2" r="0.8" fill="white"/>
          </svg>
          <span>Hi Casey</span>
          <span class="menu-arrow" aria-hidden="true">▾</span>
        </button>
        <ul class="user-dropdown" id="accountDropdown" hidden>
          <li><a href="./account.html#my-profile">My Profile</a></li>
          <li><a href="./account.html#account-settings">Account Settings</a></li>
          <li><a href="./account.html#billing-plans">Billing &amp; Plans</a></li>
          <li><a href="./account.html#notification-preferences">Notification Preferences</a></li>
          <li><a href="./account.html#team-management">Team Management</a></li>
          <li><a href="./account.html#help-center">Help Center</a></li>
          <li><a href="./account.html#sign-out">Sign Out</a></li>
        </ul>
      </div>
    </header>

    <main class="simple-page">
      <a class="back-link" href="./process-change.html">← Back to Project</a>

      <div class="planner-header">
        <span class="project-template-tag" id="planTemplateTag">Process Change</span>
        <h1>Change Plan — <span id="planProjectName">My Project</span></h1>
        <div class="planner-stats" id="plannerStats"></div>
      </div>

      <div class="planner-toolbar">
        <button type="button" class="start-project-btn" id="addTaskBtn">+ Add Task</button>
        <button type="button" class="generate-plan-btn" id="generatePlanBtn">✨ Generate AI Baseline</button>
        <button type="button" class="ghost-btn" id="newGroupBtn">+ New Group</button>
      </div>

      <div id="planContainer"></div>
    </main>

    <!-- Task add/edit modal -->
    <dialog class="task-modal" id="taskModal" aria-labelledby="taskModalTitle">
      <div class="task-modal-inner">
        <div class="task-modal-header">
          <h2 id="taskModalTitle">Add Task</h2>
          <button type="button" class="task-modal-close" id="taskModalClose" aria-label="Close">✕</button>
        </div>
        <form id="taskForm">
          <div class="task-form-grid">
            <div class="task-form-field full">
              <label for="tf-title">Task title <span style="color:var(--accent)">*</span></label>
              <input id="tf-title" type="text" required maxlength="140" placeholder="e.g. Map current process and identify pain points" />
            </div>
            <div class="task-form-field">
              <label for="tf-group">Group</label>
              <select id="tf-group"></select>
            </div>
            <div class="task-form-field">
              <label for="tf-status">Status</label>
              <select id="tf-status">
                <option value="not-started">Not started</option>
                <option value="in-progress">In progress</option>
                <option value="complete">Complete</option>
                <option value="blocked">Blocked</option>
              </select>
            </div>
            <div class="task-form-field">
              <label for="tf-owner">Owner</label>
              <input id="tf-owner" type="text" placeholder="e.g. Project Lead" maxlength="60" />
            </div>
            <div class="task-form-field">
              <label for="tf-start">Start date</label>
              <input id="tf-start" type="date" />
            </div>
            <div class="task-form-field">
              <label for="tf-end">End date</label>
              <input id="tf-end" type="date" />
            </div>
            <div class="task-form-field full">
              <label for="tf-deps">Dependencies</label>
              <input id="tf-deps" type="text" placeholder="e.g. Stakeholder mapping, Process documentation" maxlength="200" />
            </div>
            <div class="task-form-field full">
              <label for="tf-comments">Comments</label>
              <textarea id="tf-comments" placeholder="Any notes, risks, or context for this task…"></textarea>
            </div>
          </div>
          <div class="task-modal-footer">
            <button type="button" class="task-modal-delete" id="taskDeleteBtn" hidden>Delete task</button>
            <div class="task-modal-actions">
              <button type="button" class="modal-cancel" id="taskModalCancel">Cancel</button>
              <button type="submit" class="modal-save">Save task</button>
            </div>
          </div>
        </form>
      </div>
    </dialog>

    <!-- New group modal -->
    <dialog class="task-modal" id="groupModal" aria-labelledby="groupModalTitle">
      <div class="task-modal-inner">
        <div class="task-modal-header">
          <h2 id="groupModalTitle">Create New Group</h2>
          <button type="button" class="task-modal-close" id="groupModalClose" aria-label="Close">✕</button>
        </div>
        <form id="groupForm">
          <div class="task-form-grid">
            <div class="task-form-field full">
              <label for="gf-name">Group name <span style="color:var(--accent)">*</span></label>
              <input id="gf-name" type="text" required maxlength="60" placeholder="e.g. Risk Management, Vendor Onboarding" />
            </div>
          </div>
          <div class="task-modal-footer">
            <div></div>
            <div class="task-modal-actions">
              <button type="button" class="modal-cancel" id="groupModalCancel">Cancel</button>
              <button type="submit" class="modal-save">Create Group</button>
            </div>
          </div>
        </form>
      </div>
    </dialog>

    <script>
    (() => {
      // ── User menu ────────────────────────────────────────────
      const menuTrigger  = document.getElementById('userMenuTrigger');
      const menuDropdown = document.getElementById('accountDropdown');
      function closeMenu() { menuTrigger.setAttribute('aria-expanded','false'); menuDropdown.hidden = true; }
      menuTrigger.addEventListener('click', () => {
        const open = menuTrigger.getAttribute('aria-expanded') === 'true';
        menuTrigger.setAttribute('aria-expanded', String(!open));
        menuDropdown.hidden = open;
      });
      document.addEventListener('click', e => { if (!e.target.closest('.user-menu')) closeMenu(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });

      // ── Project state ────────────────────────────────────────
      const projectName = localStorage.getItem('metamor.project.name') || 'My Project';
      const projectId   = localStorage.getItem('metamor.project.id')   || '';
      const template    = localStorage.getItem('metamor.project.template') || 'Process Change';

      document.getElementById('planProjectName').textContent = projectName;
      document.getElementById('planTemplateTag').textContent = template;
      document.title = `Morp | Change Plan — ${projectName}`;

      // ── Storage keys ─────────────────────────────────────────
      const PLAN_KEY     = `metamor.${projectId}.plan`;
      const GROUPS_KEY   = `metamor.${projectId}.customGroups`;
      const GENRATED_KEY = `metamor.${projectId}.planGenerated`;

      function loadTasks()        { try { return JSON.parse(localStorage.getItem(PLAN_KEY)   || '[]'); } catch { return []; } }
      function loadCustomGroups() { try { return JSON.parse(localStorage.getItem(GROUPS_KEY) || '[]'); } catch { return []; } }
      function saveTasks(t)        { localStorage.setItem(PLAN_KEY,   JSON.stringify(t)); }
      function saveCustomGroups(g) { localStorage.setItem(GROUPS_KEY, JSON.stringify(g)); }

      let tasks        = loadTasks();
      let customGroups = loadCustomGroups();

      // ── Built-in group definitions ───────────────────────────
      const BASE_GROUPS = [
        { id:'prep',    label:'General Preparation',       chip:'📋' },
        { id:'step-01', label:'Understand the Change',     chip:'01' },
        { id:'step-02', label:'Make Case for Change',      chip:'02' },
        { id:'step-03', label:'Assess Change Radius',      chip:'03' },
        { id:'step-04', label:'Assess Change Readiness',   chip:'04' },
        { id:'step-05', label:'Communication & Alignment', chip:'05' },
        { id:'step-06', label:'Enable Workforce',          chip:'06' },
        { id:'adhoc',   label:'Ad Hoc Tasks',              chip:'✦'  },
      ];

      function allGroups() {
        return [...BASE_GROUPS, ...customGroups.map(g => ({ id:g.id, label:g.label, chip:'✦', custom:true }))];
      }

      // ── Group select helper (used by task modal) ─────────────
      function populateGroupSelect(selectedId) {
        const sel = document.getElementById('tf-group');
        sel.innerHTML = '';
        allGroups().forEach(g => {
          const opt = document.createElement('option');
          opt.value = g.id;
          opt.textContent = (isNaN(Number(g.chip)) ? g.chip + ' ' : g.chip + ' · ') + g.label;
          sel.appendChild(opt);
        });
        if (selectedId) sel.value = selectedId;
      }

      // ── Status meta ──────────────────────────────────────────
      const STATUS_META = {
        'not-started': { label:'Not started', cls:'status-not-started', dot:'#bbb'    },
        'in-progress' : { label:'In progress',  cls:'status-in-progress',  dot:'#4a90d9' },
        'complete'    : { label:'Complete',      cls:'status-complete',     dot:'#3cb97a' },
        'blocked'     : { label:'Blocked',       cls:'status-blocked',      dot:'#ff6b35' },
      };

      // ── Helpers ──────────────────────────────────────────────
      function escHtml(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
      function uid() { return 'task-' + Math.random().toString(36).slice(2,9); }
      function groupUid() { return 'group-' + Math.random().toString(36).slice(2,9); }
      function addDays(base, n) {
        const d = new Date(base); d.setDate(d.getDate() + n);
        return d.toISOString().split('T')[0];
      }
      function fmtDate(d) {
        if (!d) return '—';
        const dt = new Date(d + 'T00:00:00');
        return dt.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
      }
      function statusBadge(status) {
        const m = STATUS_META[status] || STATUS_META['not-started'];
        return `<span class="status-badge ${m.cls}">${m.label}</span>`;
      }
      function commentIcon(comments) {
        if (!comments || !comments.trim()) return '';
        return `<span class="comment-icon-wrap" aria-label="Has comment">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1.5h12v8H8.5l-3 3V9.5H1V1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
          <span class="comment-tooltip">${escHtml(comments)}</span>
        </span>`;
      }

      // ── Render ───────────────────────────────────────────────
      function renderStats() {
        const counts = { total:tasks.length, 'not-started':0, 'in-progress':0, complete:0, blocked:0 };
        tasks.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });
        document.getElementById('plannerStats').innerHTML = [
          `<span class="plan-stat"><span class="plan-stat-dot" style="background:#bbb"></span>${counts.total} task${counts.total !== 1 ? 's' : ''}</span>`,
          counts['in-progress'] ? `<span class="plan-stat"><span class="plan-stat-dot" style="background:#4a90d9"></span>${counts['in-progress']} in progress</span>` : '',
          counts.complete       ? `<span class="plan-stat"><span class="plan-stat-dot" style="background:#3cb97a"></span>${counts.complete} complete</span>` : '',
          counts.blocked        ? `<span class="plan-stat"><span class="plan-stat-dot" style="background:#ff6b35"></span>${counts.blocked} blocked</span>` : '',
        ].filter(Boolean).join('');
      }

      function renderPlan() {
        renderStats();
        const container = document.getElementById('planContainer');

        if (!tasks.length && !allGroups().length) {
          container.innerHTML = `<div class="plan-empty"><h3>No plan yet</h3><p>Click <strong>✨ Generate AI Baseline</strong> to auto-populate, or add tasks manually.</p></div>`;
          return;
        }

        container.innerHTML = '';
        allGroups().forEach(group => {
          const groupTasks = tasks.filter(t => t.group === group.id);
          const complete   = groupTasks.filter(t => t.status === 'complete').length;
          const chipEl     = isNaN(Number(group.chip))
            ? `<span style="font-size:0.88rem;line-height:1">${group.chip}</span>`
            : `<span class="step-chip">${group.chip}</span>`;

          const div = document.createElement('div');
          div.className = 'plan-group';
          div.dataset.groupId = group.id;

          const rows = groupTasks.map(task => {
            const dates = (task.startDate || task.endDate)
              ? `${fmtDate(task.startDate)} → ${fmtDate(task.endDate)}`
              : '—';
            return `<tr data-task-id="${task.id}">
              <td>${statusBadge(task.status)}</td>
              <td class="task-title-cell">${escHtml(task.title)}${commentIcon(task.comments)}</td>
              <td class="task-muted">${escHtml(task.owner || '—')}</td>
              <td class="task-muted" style="white-space:nowrap">${dates}</td>
              <td class="task-muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(task.dependencies || '—')}</td>
              <td>
                <div class="task-actions">
                  <button type="button" class="task-action-btn edit-task-btn" data-id="${task.id}">Edit</button>
                  <button type="button" class="task-action-btn danger delete-task-btn" data-id="${task.id}">✕</button>
                </div>
              </td>
            </tr>`;
          }).join('');

          const deleteGroupBtn = group.custom
            ? `<button type="button" class="task-action-btn danger delete-group-btn" data-group="${group.id}" style="font-size:0.7rem;padding:0.15rem 0.45rem" title="Delete group">Delete group</button>`
            : '';

          div.innerHTML = `
            <div class="plan-group-header">
              <div class="plan-group-meta">
                ${chipEl}
                <h2>${escHtml(group.label)}</h2>
                <span class="plan-group-count">${groupTasks.length} task${groupTasks.length !== 1 ? 's' : ''}${groupTasks.length ? ` · ${complete} done` : ''}</span>
              </div>
              <div style="display:flex;align-items:center;gap:0.5rem">
                ${deleteGroupBtn}
                <span class="plan-group-chevron">▾</span>
              </div>
            </div>
            <div class="plan-group-body">
              ${groupTasks.length ? `
              <table class="plan-table">
                <thead><tr>
                  <th>Status</th><th>Task</th><th>Owner</th><th>Dates</th><th>Dependencies</th><th></th>
                </tr></thead>
                <tbody>${rows}</tbody>
              </table>` : ''}
              <button type="button" class="add-group-task-btn" data-group="${group.id}">+ Add task to this group</button>
            </div>`;

          container.appendChild(div);
        });

        // Collapse toggle
        container.querySelectorAll('.plan-group-header').forEach(h => {
          h.addEventListener('click', e => {
            if (e.target.closest('.delete-group-btn') || e.target.closest('.task-action-btn')) return;
            h.closest('.plan-group').classList.toggle('collapsed');
          });
        });

        // Edit
        container.querySelectorAll('.edit-task-btn').forEach(btn => {
          btn.addEventListener('click', e => { e.stopPropagation(); openTaskModal(btn.dataset.id); });
        });

        // Delete task
        container.querySelectorAll('.delete-task-btn').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            if (!confirm('Delete this task?')) return;
            tasks = tasks.filter(t => t.id !== btn.dataset.id);
            saveTasks(tasks);
            renderPlan();
          });
        });

        // Add to group
        container.querySelectorAll('.add-group-task-btn').forEach(btn => {
          btn.addEventListener('click', () => openTaskModal(null, btn.dataset.group));
        });

        // Delete group
        container.querySelectorAll('.delete-group-btn').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            const gid = btn.dataset.group;
            const count = tasks.filter(t => t.group === gid).length;
            const msg = count
              ? `Delete this group and its ${count} task${count > 1 ? 's' : ''}?`
              : 'Delete this empty group?';
            if (!confirm(msg)) return;
            tasks = tasks.filter(t => t.group !== gid);
            customGroups = customGroups.filter(g => g.id !== gid);
            saveTasks(tasks);
            saveCustomGroups(customGroups);
            renderPlan();
          });
        });
      }

      // ── Task modal ───────────────────────────────────────────
      const taskModal   = document.getElementById('taskModal');
      const taskForm    = document.getElementById('taskForm');
      const tfTitle     = document.getElementById('tf-title');
      const tfStatus    = document.getElementById('tf-status');
      const tfOwner     = document.getElementById('tf-owner');
      const tfStart     = document.getElementById('tf-start');
      const tfEnd       = document.getElementById('tf-end');
      const tfDeps      = document.getElementById('tf-deps');
      const tfComments  = document.getElementById('tf-comments');
      const modalTitle  = document.getElementById('taskModalTitle');
      const deleteBtn   = document.getElementById('taskDeleteBtn');
      let editingId     = null;

      function openTaskModal(taskId, defaultGroup) {
        editingId = taskId || null;
        modalTitle.textContent = taskId ? 'Edit Task' : 'Add Task';
        deleteBtn.hidden = !taskId;
        populateGroupSelect(defaultGroup || (taskId ? tasks.find(t => t.id === taskId)?.group : 'prep'));

        if (taskId) {
          const t = tasks.find(t => t.id === taskId);
          if (!t) return;
          tfTitle.value    = t.title;
          document.getElementById('tf-group').value = t.group;
          tfStatus.value   = t.status;
          tfOwner.value    = t.owner || '';
          tfStart.value    = t.startDate || '';
          tfEnd.value      = t.endDate   || '';
          tfDeps.value     = t.dependencies || '';
          tfComments.value = t.comments  || '';
        } else {
          taskForm.reset();
          if (defaultGroup) document.getElementById('tf-group').value = defaultGroup;
          tfStatus.value = 'not-started';
        }
        taskModal.showModal();
        setTimeout(() => tfTitle.focus(), 50);
      }

      document.getElementById('taskModalClose').addEventListener('click',  () => taskModal.close());
      document.getElementById('taskModalCancel').addEventListener('click', () => taskModal.close());
      taskModal.addEventListener('click', e => { if (e.target === taskModal) taskModal.close(); });

      deleteBtn.addEventListener('click', () => {
        if (!editingId || !confirm('Delete this task?')) return;
        tasks = tasks.filter(t => t.id !== editingId);
        saveTasks(tasks);
        taskModal.close();
        renderPlan();
      });

      taskForm.addEventListener('submit', e => {
        e.preventDefault();
        const taskData = {
          id:           editingId || uid(),
          group:        document.getElementById('tf-group').value,
          title:        tfTitle.value.trim(),
          owner:        tfOwner.value.trim(),
          startDate:    tfStart.value || '',
          endDate:      tfEnd.value   || '',
          status:       tfStatus.value,
          dependencies: tfDeps.value.trim(),
          comments:     tfComments.value.trim(),
        };
        if (!taskData.title) { tfTitle.focus(); return; }
        if (editingId) {
          const idx = tasks.findIndex(t => t.id === editingId);
          if (idx >= 0) tasks[idx] = taskData;
        } else {
          tasks.push(taskData);
        }
        saveTasks(tasks);
        taskModal.close();
        renderPlan();
      });

      document.getElementById('addTaskBtn').addEventListener('click', () => openTaskModal(null));

      // ── New group modal ──────────────────────────────────────
      const groupModal  = document.getElementById('groupModal');
      const groupForm   = document.getElementById('groupForm');
      const gfName      = document.getElementById('gf-name');

      document.getElementById('newGroupBtn').addEventListener('click',    () => { groupForm.reset(); groupModal.showModal(); setTimeout(() => gfName.focus(), 50); });
      document.getElementById('groupModalClose').addEventListener('click', () => groupModal.close());
      document.getElementById('groupModalCancel').addEventListener('click',() => groupModal.close());
      groupModal.addEventListener('click', e => { if (e.target === groupModal) groupModal.close(); });

      groupForm.addEventListener('submit', e => {
        e.preventDefault();
        const label = gfName.value.trim();
        if (!label) { gfName.focus(); return; }
        const newGroup = { id: groupUid(), label };
        customGroups.push(newGroup);
        saveCustomGroups(customGroups);
        groupModal.close();
        renderPlan();
      });

      // ── Generate AI Baseline ─────────────────────────────────
      const generateBtn = document.getElementById('generatePlanBtn');

      function markGenerated() {
        localStorage.setItem(GENRATED_KEY, 'true');
        generateBtn.disabled = true;
        generateBtn.textContent = '✓ Baseline generated';
        generateBtn.setAttribute('aria-disabled', 'true');
        generateBtn.title = 'Baseline already generated. Add tasks manually to extend the plan.';
      }

      if (localStorage.getItem(GENRATED_KEY)) markGenerated();

      generateBtn.addEventListener('click', async () => {
        if (generateBtn.disabled) return;
        generateBtn.disabled = true;
        generateBtn.textContent = '⏳ Generating…';
        document.getElementById('planContainer').innerHTML = '<div class="plan-generating">Generating your baseline plan — this takes a few seconds…</div>';

        try {
          const changeAnalysis = projectId ? localStorage.getItem(`metamor.${projectId}.outputs.changeAnalysis`) || '' : '';
          const executiveMemo  = projectId ? localStorage.getItem(`metamor.${projectId}.outputs.executiveMemo`)  || '' : '';

          const res  = await fetch('/api/project-plan/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ projectName, template, changeAnalysis, executiveMemo }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
          tasks = data.tasks.map(t => ({ ...t, id: t.id || uid(), dependencies: t.dependencies || '', comments: t.comments || '' }));
          saveTasks(tasks);
          markGenerated();
        } catch (err) {
          console.warn('AI baseline failed, using static fallback:', err.message);
          tasks = buildFallbackPlan();
          saveTasks(tasks);
          markGenerated();
        }
        renderPlan();
      });
